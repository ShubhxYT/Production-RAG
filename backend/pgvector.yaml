version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: fullrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fullrag
      POSTGRES_USER: fullrag
      POSTGRES_PASSWORD: fullrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullrag -d fullrag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
