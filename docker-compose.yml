services:
  db:
    image: pgvector/pgvector:pg17
    container_name: fullrag-plus-postgres
    environment:
      POSTGRES_DB: fullrag
      POSTGRES_USER: fullrag
      POSTGRES_PASSWORD: fullrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullrag -d fullrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullrag-plus-backend
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the "db" Docker service name instead of localhost
      DATABASE_URL: postgresql+psycopg://fullrag:fullrag@db:5432/fullrag
    volumes:
      # Mount transcript fallback data directory
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fullrag-plus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
